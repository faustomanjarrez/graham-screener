name: Actualizar datos y publicar app

on:
  push:
    branches: [main]
  schedule:
    # Lunes a viernes, 22:30 UTC (~después del cierre de NYSE)
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: graham-pipeline
  cancel-in-progress: false

jobs:
  # Corre el screener completo (~25 min) — solo en corridas programadas o manuales
  update-data:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install yfinance==1.4.1 pandas requests lxml

      - name: Correr screener Graham (~25 min)
        run: python fetch_graham.py --fresh

      - name: Guardar datos nuevos en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data.js graham_data.js graham_screen.json
          git diff --cached --quiet || git commit -m "📊 Datos actualizados $(date -u +'%Y-%m-%d')"
          git push

  # Publica la carpeta app/ en GitHub Pages
  deploy:
    needs: update-data
    if: always() && !cancelled() && (needs.update-data.result == 'success' || needs.update-data.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app

      - id: deployment
        uses: actions/deploy-pages@v4
